<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White background -->
  <rect width="64" height="64" rx="12" fill="white"/>
  <!-- Outer cross shape (thick green) -->
  <!-- Vertical bar outer -->
  <rect x="22" y="4" width="20" height="56" rx="10" fill="#4ade80"/>
  <!-- Horizontal bar outer -->
  <rect x="4" y="22" width="56" height="20" rx="10" fill="#4ade80"/>
  <!-- Inner cutout vertical (white channel) -->
  <rect x="27.5" y="4" width="9" height="56" rx="4.5" fill="white"/>
  <!-- Inner cutout horizontal (white channel) -->
  <rect x="4" y="27.5" width="56" height="9" rx="4.5" fill="white"/>
  <!-- Center intersection fill (where the two bars cross, re-fill green) -->
  <rect x="22" y="22" width="20" height="20" fill="#4ade80"/>
  <!-- Center intersection inner white (cross center hole) -->
  <rect x="27.5" y="27.5" width="9" height="9" fill="white"/>
</svg>